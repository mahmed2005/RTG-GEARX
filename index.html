  <script>
    /**************************************************************************
     * إعدادات
     * ضع هنا معرف Google Sheet (الذي استخدمته سابقاً) أو اترك كما هو.
     **************************************************************************/
    const sheetID = "1Snn6XeZX-7nYrAK7sG8nvFDu8FNTgzXdYVmxAc-uQzc"; // عدله إذا لزم
    const adminPhone = "218934590635";

    /**************************************************************************
     * دوال مساعدة لتضمين الفيديو بشكل آمن
     * - نحاول تحويل روابط YouTube و Google Drive وملفات الفيديو المباشرة إلى روابط قابلة للعرض داخل iframe.
     * - نحتفظ بالرابط الأصلي في data-orig-src حتى نتمكن من إفراغ src لإيقاف الصوت عند التنقل،
     *   ثم نعيده فقط عندما نعود إلى الصفحة المناسبة.
     **************************************************************************/
    function getEmbedUrl(raw) {
      if (!raw) return "";
      raw = raw.trim().replace(/"/g, "");
      // YouTube (id 11 char)
      let m = raw.match(/(?:v=|\/embed\/|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      if (m && m[1]) {
        // enable JS API to allow postMessage pause (if needed)
        return `https://www.youtube.com/embed/${m[1]}?rel=0&enablejsapi=1`;
      }
      // Google Drive file id
      m = raw.match(/(?:\/d\/|id=)([a-zA-Z0-9_-]{10,})/);
      if (m && m[1]) {
        return `https://drive.google.com/file/d/${m[1]}/preview`;
      }
      // direct video file
      if (raw.match(/\.(mp4|webm|ogg)(\?|$)/)) return raw;
      // already embed-like
      if (raw.includes('youtube.com/embed') || raw.includes('drive.google.com/file')) return raw;
      // fallback: if it's a normal youtube watch link with additional params
      m = raw.match(/youtube\.com.*[?&]v=([A-Za-z0-9_-]{11})/);
      if (m && m[1]) return `https://www.youtube.com/embed/${m[1]}?rel=0&enablejsapi=1`;
      return "";
    }

    /**************************************************************************
     * دالة لإيقاف كل الفيديوهات الحالية فوراً
     * - تحفظ src الأصلي في data-orig-src (إذا لم يكن محفوظاً)
     * - تفرغ src لإيقاف الصوت فوراً
     **************************************************************************/
    function stopAllVideos() {
      document.querySelectorAll('iframe, video').forEach(el => {
        if (el.tagName.toLowerCase() === 'iframe') {
          if (!el.dataset.origSrc) el.dataset.origSrc = el.src || "";
          // محاولة إيقاف يوتيوب عبر postMessage (إذا كان enablejsapi=1)
          try {
            el.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
          } catch (e) {}
          // ثم نزيل src فعلياً لضمان توقف الصوت (بعض المتصفحات تستمر)
          el.src = "";
        } else if (el.tagName.toLowerCase() === 'video') {
          try { el.pause(); el.currentTime = 0; } catch(e){}
        }
      });
      // تحديث badge أو أي حالة أخرى إذا لزم
    }

    /**************************************************************************
     * دالة لاستعادة الفيديوهات لصفحة محددة (نستعيد فقط iframes داخل عنصر الحاوية)
     * containerSelector: محدد الحاوية التي نريد استعادة الفيديوهات بداخلها
     **************************************************************************/
    function restoreVideosIn(containerSelector) {
      const container = document.querySelector(containerSelector);
      if (!container) return;
      container.querySelectorAll('iframe').forEach(iframe => {
        if (iframe.dataset.origSrc) {
          // استعادة src فقط إذا كانت فارغة الآن
          if (!iframe.src || iframe.src === "") iframe.src = iframe.dataset.origSrc;
        }
      });
      container.querySelectorAll('video').forEach(v => {
        try { if (v.paused) v.currentTime = 0; } catch(e){}
      });
    }

    /**************************************************************************
     * دالة عرض الصفحات (تقوم بإيقاف الفيديوهات عند التنقل)
     **************************************************************************/
    function showPage(pageId, btn) {
      // إيقاف كل الفيديوهات فوراً
      stopAllVideos();

      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      const page = document.getElementById(pageId + '-page');
      if (page) page.style.display = 'block';

      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      // استعادة الفيديوهات الخاصة بالصفحة التي نعرضها (بعد تأخير بسيط لضمان DOM)
      setTimeout(() => {
        if (pageId === 'pubg') restoreVideosIn('#pubg-container');
        if (pageId === 'home') restoreVideosIn('#home-page');
        if (pageId === 'shop') restoreVideosIn('#shop-page');
      }, 120);
      // إغلاق تفاصيل إن كانت مفتوحة
      closeDetails();
    }

    /**************************************************************************
     * تحميل بيانات من Google Sheets بصيغة CSV وتحويلها إلى صفوف مع رؤوس الأعمدة
     * - نقرأ السطر الأول كعناوين (headers)
     * - نعرض كل صف كـ بطاقة، ونضع تحت الفيديو كل الحقول (header: value)
     * - إذا وجدنا عمود "الاعتماد" أو "اعتماد" أو "نشر" أو "موافق" نستخدمه كفلتر لعرض الصفوف التي تحتوي "نعم"
     **************************************************************************/
    async function loadPubgData() {
      const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;
      const container = document.getElementById('pubg-container');
      const loading = document.getElementById('loading-text');
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('خطأ في جلب الملف');
        const text = await res.text();
        // تقسيم الأسطر مع مراعاة الأسطر الفارغة
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        if (lines.length < 2) {
          container.innerHTML = '<p class="center muted">لا توجد بيانات في الجدول.</p>';
          loading.style.display = 'none';
          return;
        }
        // parse CSV header (بسيط: يفترض أن الفواصل هي , وأن القيم قد تكون محاطة بعلامات اقتباس)
        const parseCsvLine = (line) => {
          const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim());
          return parts;
        };
        const headers = parseCsvLine(lines[0]);
        // تحديد عمود الاعتماد إن وجد
        const approvalCandidates = ['الاعتماد','اعتماد','نشر','موافق','موافقة','نشر؟'];
        let approvalIndex = -1;
        headers.forEach((h,i) => {
          const hh = h.replace(/\s+/g,'').toLowerCase();
          if (approvalCandidates.some(a => hh.includes(a.replace(/\s+/g,'')))) approvalIndex = i;
        });

        // بناء البطاقات
        let html = '';
        for (let i = 1; i < lines.length; i++) {
          const row = parseCsvLine(lines[i]);
          // تجاهل الصفوف الفارغة
          if (row.every(cell => cell === '')) continue;

          // إذا وجد عمود اعتماد، نعرض فقط الصفوف التي تحتوي "نعم" أو "Yes"
          if (approvalIndex >= 0) {
            const val = (row[approvalIndex] || '').toString().trim().toLowerCase();
            if (!(val === 'نعم' || val === 'yes' || val === 'true' || val === 'موافق')) continue;
          }

          // نحاول استخراج بعض الحقول الشائعة (اسم البائع، اسم الحساب، السعر، رابط الفيديو) إن وجدت
          // لكن الأهم: سنعرض كل الحقول تحت الفيديو باستخدام headers
          const headerMap = {};
          headers.forEach((h, idx) => headerMap[h || `col${idx}`] = row[idx] || '');

          // محاولة إيجاد حقل رابط الفيديو (قد يكون في أي عمود)
          let rawVideo = '';
          // شائع أن يكون عنوان الحقل "رابط التوثيق" أو "رابط الفيديو" أو "رابط"
          const videoCandidates = ['رابط الفيديو','رابط التوثيق','رابط','video','link','video link','رابط_الفيديو'];
          for (let j = 0; j < headers.length; j++) {
            const hh = (headers[j] || '').toLowerCase().replace(/\s+/g,'');
            if (videoCandidates.some(vc => hh.includes(vc.replace(/\s+/g,'')))) {
              rawVideo = row[j] || '';
              break;
            }
          }
          // إذا لم نجد، حاول العمود رقم 14 أو 15 أو 16 (كما في الكود السابق)
          if (!rawVideo) rawVideo = row[14] || row[15] || row[16] || '';

          const embedUrl = getEmbedUrl(rawVideo);

          // محاولة إيجاد اسم الحساب والسعر والبائع من أي عمود شائع
          const findByHeader = (candidates) => {
            for (let j = 0; j < headers.length; j++) {
              const hh = (headers[j] || '').toLowerCase();
              if (candidates.some(c => hh.includes(c))) return row[j] || '';
            }
            return '';
          };
          const accName = findByHeader(['اسم الحساب','الحساب','account','اسم المشروع','اسم']); // مرن
          const price = findByHeader(['السعر','price','تكلفة','قيمة']);
          const seller = findByHeader(['البائع','اسم البائع','seller','المدخل','اسم المدخل']);

          // بناء HTML للبطاقة
          html += `<div class="card pubg-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div style="font-weight:800;color:var(--gold)">${seller || 'بائع غير معروف'}</div>
              <div style="font-size:0.9rem;color:var(--muted)">${accName || ''}</div>
            </div>
            <div class="video-wrap">`;
          if (embedUrl) {
            // نضع src في data-orig-src ونترك src فارغ الآن؛ سيتم استعادته عند عرض الصفحة
            // لكن لعرض الفيديو عند التحميل الأول إن كانت الصفحة مرئية، نضع src مباشرة
            html += `<iframe data-orig-src="${embedUrl}" src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
          } else {
            html += `<div class="no-video">لا يوجد فيديو قابل للعرض أو الرابط غير مدعوم للعرض المباشر.</div>`;
          }
          html += `</div>`;

          // تفاصيل سريعة
          html += `<div class="meta">
            <div><b>السعر:</b> ${price ? price + ' د.ل' : '<span class="muted">غير محدد</span>'}</div>
            <div><b>الاعتماد:</b> ${approvalIndex >= 0 ? (row[approvalIndex] || '-') : '-'}</div>
          </div>`;

          // عرض كل الحقول تحت الفيديو بشكل منسق
          html += `<div class="all-fields">`;
          headers.forEach((h, idx) => {
            const val = row[idx] || '';
            // تجاهل الحقول الفارغة تماماً لعدم ازدحام الواجهة
            html += `<div class="field-row"><div style="color:var(--muted);min-width:40%">${h || 'حقل'}</div><div style="text-align:left">${val || '<span class="muted">—</span>'}</div></div>`;
          });
          html += `</div>`;

          // زر شراء/طلب وسيط
          const safeAcc = accName ? accName.replace(/'/g,"\\'") : '';
          const safePrice = price ? price.replace(/'/g,"\\'") : '';
          const safeSeller = seller ? seller.replace(/'/g,"\\'") : '';
          html += `<button class="btn btn-buy" onclick="startPubgBuy('${escapeHtml(safeAcc)}','${escapeHtml(safePrice)}','${escapeHtml(safeSeller)}')">طلب شراء عبر الوسيط</button>`;
          html += `</div>`;
        }

        container.innerHTML = html || '<p class="center muted">لا توجد حسابات معتمدة للعرض.</p>';
        loading.style.display = 'none';
        // بعد العرض، تأكد أن الفيديوهات التي في الصفحة الحالية لديها src (استعادة)
        setTimeout(() => restoreVideosIn('#pubg-container'), 150);
      } catch (err) {
        console.error(err);
        container.innerHTML = `<p class="center muted">حدث خطأ أثناء تحميل البيانات.</p>`;
        loading.innerText = 'خطأ في تحميل الحسابات.';
      }
    }

    /**************************************************************************
     * دوال شراء / إرسال رسالة واتساب
     **************************************************************************/
    let tempPubg = {};
    function startPubgBuy(acc, price, seller) {
      tempPubg = { acc: acc || 'غير محدد', price: price || 'غير محدد', seller: seller || 'غير محدد' };
      // نفتح نافذة تأكيد بسيطة (يمكن استبدالها بواجهة أفضل)
      openDetailsForPurchase();
    }

    function openDetailsForPurchase() {
      const title = `طلب شراء: ${tempPubg.acc}`;
      document.getElementById('detail-title').innerText = title;
      const content = `
        <div style="display:grid;gap:8px">
          <div><b>اسم الحساب:</b> ${tempPubg.acc}</div>
          <div><b>السعر:</b> ${tempPubg.price} د.ل</div>
          <div><b>البائع:</b> ${tempPubg.seller}</div>
          <div style="margin-top:12px">
            <input id="buyer-name" placeholder="اسمك الكامل" style="width:100%;padding:10px;border-radius:8px;border:1px solid #222;background:#0b0b0b;color:#fff" />
            <input id="buyer-phone" placeholder="رقم هاتف الواتساب" style="width:100%;padding:10px;border-radius:8px;border:1px solid #222;background:#0b0b0b;color:#fff;margin-top:8px" />
            <button class="btn btn-buy" style="margin-top:10px" onclick="sendPubgFinal()">تأكيد وإرسال طلب الشراء</button>
          </div>
        </div>
      `;
      document.getElementById('detail-content').innerHTML = content;
      document.getElementById('detail-overlay').style.display = 'flex';
      // عند فتح التفاصيل، نوقف كل الفيديوهات الأخرى ونستعيد فيديو البطاقة الحالية (إن وُجد)
      stopAllVideos();
      // استعادة فيديوهات داخل overlay إن وُجدت (لا يوجد عادة)
      setTimeout(() => restoreVideosIn('#detail-content'), 120);
    }

    function sendPubgFinal() {
      const bName = document.getElementById('buyer-name').value.trim();
      const bPhone = document.getElementById('buyer-phone').value.trim();
      if (!bName || !bPhone) return alert('أكمل الاسم ورقم الهاتف');

      const msg = `🔴 طلب شراء حساب ببجي 🔴%0A%0A` +
                  `🎮 الحساب: ${tempPubg.acc}%0A` +
                  `💰 السعر: ${tempPubg.price} د.ل%0A` +
                  `👤 البائع: ${tempPubg.seller}%0A%0A` +
                  `📝 بيانات المشتري:%0A` +
                  `الاسم: ${bName}%0A` +
                  `الهاتف: ${bPhone}%0A%0A` +
                  `✅ الرجاء التواصل لإتمام الوساطة.`;
      const url = `https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
    }

    function closeDetails() {
      document.getElementById('detail-overlay').style.display = 'none';
      // عند إغلاق التفاصيل نوقف أي فيديو داخلها
      stopAllVideos();
      // استعادة فيديوهات الصفحة الحالية (مثلاً إذا كنا في pubg)
      setTimeout(() => restoreVideosIn('#pubg-container'), 120);
    }

    function overlayClick(e) {
      if (e.target.id === 'detail-overlay') closeDetails();
    }

    /**************************************************************************
     * مساعدة: هروب نص آمن للـ onclick
     **************************************************************************/
    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    /**************************************************************************
     * بدء التشغيل
     **************************************************************************/
    window.addEventListener('load', () => {
      // عرض الصفحة الافتراضية
      showPage('home');
      // تحميل بيانات السوق
      loadPubgData();
      // تحديث عداد السلة (مكانه افتراضي الآن)
      document.getElementById('cart-count').innerText = '0';
    });

    // عند التنقل عبر روابط داخل الصفحة (مثلاً روابط خارجية) نوقف الفيديوهات
    window.addEventListener('beforeunload', () => stopAllVideos());
  </script>
